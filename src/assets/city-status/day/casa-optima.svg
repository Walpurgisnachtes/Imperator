<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 晴朗藍天背景 -->
  <rect x="0" y="0" width="256" height="256" fill="#A0E0FF" />
  
  <!-- 溫暖的太陽 -->
  <circle cx="210" cy="50" r="16" fill="#FFF176" opacity="0.9" />
  
  <!-- 日間白雲 -->
  <path d="M 25 80 A 12 12 0 0 1 41 68 A 16 16 0 0 1 69 68 A 12 12 0 0 1 85 80 Z" fill="#FFFFFF" opacity="0.85" />

  <!-- 翠綠山丘 -->
  <path d="M 0 180 Q 100 150 256 175 L 256 256 L 0 256 Z" fill="#4CAF50" />
  <path d="M 0 200 Q 150 180 256 205 L 256 256 L 0 256 Z" fill="#388E3C" opacity="0.9" />

  <!-- 石板小徑 -->
  <path d="M 120 195 L 90 256 L 150 256 L 135 195 Z" fill="#CFD8DC" />

  <!-- 羅馬式石造小屋 (Romanesque Casa - 日間版) -->
  
  <!-- 1. 左側圓柱形防禦塔樓 (Tower) -->
  <!-- 塔身 -->
  <rect x="75" y="110" width="34" height="90" fill="#ECEFF1" stroke="#455A64" stroke-width="1.5" />
  <!-- 石磚紋理 -->
  <line x1="75" y1="130" x2="109" y2="130" stroke="#B0BEC5" stroke-width="0.8" stroke-dasharray="4,6" />
  <line x1="75" y1="155" x2="109" y2="155" stroke="#B0BEC5" stroke-width="0.8" stroke-dasharray="6,4" />
  <line x1="75" y1="180" x2="109" y2="180" stroke="#B0BEC5" stroke-width="0.8" stroke-dasharray="3,5" />
  
  <!-- 塔頂錐形圓屋頂 -->
  <polygon points="71,112 92,65 113,112" fill="#E64A19" stroke="#BF360C" stroke-width="1.5" />
  
  <!-- 塔樓窄窗 (防禦性槍眼) -->
  <path d="M 88 135 A 4 4 0 0 1 96 135 L 96 150 L 88 150 Z" fill="#90CAF9" stroke="#455A64" stroke-width="1" />

  <!-- 2. 右側主屋 (Main Hall) -->
  <!-- 主屋牆面 -->
  <rect x="109" y="130" width="75" height="70" fill="#CFD8DC" stroke="#455A64" stroke-width="1.5" />
  <!-- 石磚紋理 -->
  <line x1="109" y1="150" x2="184" y2="150" stroke="#90A4AE" stroke-width="0.8" stroke-dasharray="8,5" />
  <line x1="109" y1="175" x2="184" y2="175" stroke="#90A4AE" stroke-width="0.8" stroke-dasharray="5,8" />

  <!-- 主屋重型雙面屋頂 -->
  <polygon points="102,132 146,92 190,132" fill="#FF5722" stroke="#D84315" stroke-width="1.5" />

  <!-- 經典羅馬式半圓拱門 (Round-Arched Portal) -->
  <!-- 拱門外框 (石面裝飾) -->
  <path d="M 120 200 L 120 172 A 13 13 0 0 1 146 172 L 146 200 Z" fill="none" stroke="#78909C" stroke-width="3" />
  <!-- 木門 -->
  <path d="M 123 200 L 123 173 A 10 10 0 0 1 143 173 L 143 200 Z" fill="#8D6E63" stroke="#5D4037" stroke-width="1.5" />
  <!-- 鐵鑄鉸鏈細節 -->
  <circle cx="127" cy="188" r="1" fill="#37474F" />
  <circle cx="139" cy="188" r="1.5" fill="#FFD54F" /> <!-- 銅質門把 -->

  <!-- 經典雙聯拱窗 (Bifora Window) -->
  <!-- 外拱結構 -->
  <path d="M 154 162 A 8 8 0 0 1 170 162 Z" fill="#455A64" />
  <!-- 雙個小圓拱窗 -->
  <path d="M 155 162 L 155 152 A 3 3 0 0 1 161 152 L 161 162 Z" fill="#E3F2FD" stroke="#455A64" stroke-width="0.8" />
  <path d="M 163 162 L 163 152 A 3 3 0 0 1 169 152 L 169 162 Z" fill="#E3F2FD" stroke="#455A64" stroke-width="0.8" />
  <!-- 中間的小石柱 -->
  <rect x="161" y="152" width="2" height="10" fill="#90A4AE" />

  <!-- 3. 前院與裝飾 -->
  <!-- 牆角的古老灌木 -->
  <path d="M 60 200 Q 55 185 70 185 Q 80 180 85 190 Q 95 190 90 200 Z" fill="#2E7D32" />
  <path d="M 180 200 Q 175 190 185 185 Q 195 190 190 200 Z" fill="#2E7D32" />
</svg>
